name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Smoke test (development runtime)
        run: npm run smoke:dev

      - name: Start PostgreSQL
        uses: harmon758/postgresql-action@v1
        with:
          postgresql version: '17'
          postgresql db: mavyclaw
          postgresql user: mavyclaw
          postgresql password: mavyclaw

      - name: Smoke test (production file runtime)
        run: npm run smoke:prod

      - name: Smoke test (production PostgreSQL runtime)
        env:
          DATABASE_URL: postgresql://mavyclaw:mavyclaw@127.0.0.1:5432/mavyclaw
        run: npm run smoke:postgres
